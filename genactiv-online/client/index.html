<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenActiv Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header id="header">
    <div class="header-left">
      <div class="header-logo">G</div>
      <div class="header-title">
        <h1>GenActiv<span class="header-suffix">Online</span></h1>
        <span id="status" class="status">Łączenie...</span>
      </div>
    </div>
    <form method="POST" action="/logout" style="margin:0">
      <button id="logout-btn" type="submit">Wyloguj</button>
    </form>
  </header>

  <main id="chat">
    <div id="chat-inner"></div>
  </main>

  <div id="input-area">
    <div id="input-wrapper">
      <textarea id="input" rows="1" placeholder="Zadaj pytanie o Klaviyo, Shopify, Google Ads, GA4 lub Meta Ads..." autofocus></textarea>
      <button id="send-btn" type="button" aria-label="Wyślij">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter — wyślij · Shift+Enter — nowa linia</div>
  </div>

  <script src="terminal.js"></script>
</body>
</html>
